# Vendored fork of camera_windows 0.2.6+4 that adds
# CameraWindows.getPreviewFrame for polling raw preview frames (the
# upstream package has no image streaming; see
# https://github.com/flutter/flutter/issues/97542).
name: camera_windows
description: A Flutter plugin for getting information about and controlling the camera on Windows.
repository: https://github.com/flutter/packages/tree/main/packages/camera/camera_windows
issue_tracker: https://github.com/flutter/flutter/issues?q=is%3Aissue+is%3Aopen+label%3A%22p%3A+camera%22
version: 0.2.6+4
publish_to: none

environment:
  sdk: ^3.8.0
  flutter: ">=3.32.0"

flutter:
  plugin:
    implements: camera
    platforms:
      windows:
        pluginClass: CameraWindows
        dartPluginClass: CameraWindows

dependencies:
  camera_platform_interface: ^2.6.0
  cross_file: ^0.3.1
  flutter:
    sdk: flutter
  stream_transform: ^2.0.0

# The upstream dev_dependencies (pigeon, mockito, ...) are omitted
# together with the pigeons/ and test/ directories: this vendored copy
# is only consumed by the app, not developed as a standalone plugin.

topics:
  - camera
